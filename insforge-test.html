<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InsForge 连接测试</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .status-card {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .status-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #e9ecef;
        }

        .status-item:last-child {
            border-bottom: none;
        }

        .status-label {
            font-weight: 600;
            color: #495057;
        }

        .status-value {
            font-family: monospace;
            font-size: 14px;
        }

        .status-online {
            color: #28a745;
            font-weight: bold;
        }

        .status-offline {
            color: #dc3545;
            font-weight: bold;
        }

        .status-checking {
            color: #ffc107;
            font-weight: bold;
        }

        button {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 10px;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #6c757d;
            color: white;
        }

        .btn-secondary:hover {
            background: #5a6268;
        }

        .log-container {
            background: #1e1e1e;
            border-radius: 10px;
            padding: 20px;
            margin-top: 20px;
            max-height: 300px;
            overflow-y: auto;
        }

        .log-item {
            color: #d4d4d4;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            margin-bottom: 8px;
            line-height: 1.5;
        }

        .log-success {
            color: #4ec9b0;
        }

        .log-error {
            color: #f48771;
        }

        .log-info {
            color: #9cdcfe;
        }

        .spinner {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid #f3f3f3;
            border-top: 2px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 8px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .badge-success {
            background: #d4edda;
            color: #155724;
        }

        .badge-danger {
            background: #f8d7da;
            color: #721c24;
        }

        .badge-warning {
            background: #fff3cd;
            color: #856404;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 InsForge 连接测试</h1>
        <p class="subtitle">实时检测 InsForge 服务器连接状态</p>

        <div class="status-card">
            <div class="status-item">
                <span class="status-label">服务器地址:</span>
                <span class="status-value" id="serverUrl">http://localhost:7130</span>
            </div>
            <div class="status-item">
                <span class="status-label">连接状态:</span>
                <span class="status-value status-checking" id="connectionStatus">
                    <span class="spinner"></span>检测中...
                </span>
            </div>
            <div class="status-item">
                <span class="status-label">API 版本:</span>
                <span class="status-value" id="apiVersion">-</span>
            </div>
            <div class="status-item">
                <span class="status-label">最后检测:</span>
                <span class="status-value" id="lastCheck">-</span>
            </div>
        </div>

        <button class="btn-primary" onclick="testConnection()">
            🔄 重新检测连接
        </button>

        <button class="btn-primary" onclick="testRegister()">
            👤 测试用户注册
        </button>

        <button class="btn-secondary" onclick="clearLogs()">
            🗑️ 清除日志
        </button>

        <div class="log-container" id="logContainer">
            <div class="log-item log-info">等待测试...</div>
        </div>
    </div>

    <script>
        const SERVER_URL = 'http://localhost:7130';
        let logs = [];

        function addLog(message, type = 'info') {
            const timestamp = new Date().toLocaleTimeString();
            logs.push({ timestamp, message, type });
            updateLogDisplay();
        }

        function updateLogDisplay() {
            const container = document.getElementById('logContainer');
            container.innerHTML = logs.map(log =>
                `<div class="log-item log-${log.type}">[${log.timestamp}] ${log.message}</div>`
            ).join('');
            container.scrollTop = container.scrollHeight;
        }

        function clearLogs() {
            logs = [];
            updateLogDisplay();
            addLog('日志已清除', 'info');
        }

        function updateStatus(status, version = '-') {
            const statusEl = document.getElementById('connectionStatus');
            const versionEl = document.getElementById('apiVersion');
            const lastCheckEl = document.getElementById('lastCheck');

            versionEl.textContent = version;
            lastCheckEl.textContent = new Date().toLocaleTimeString();

            if (status === 'online') {
                statusEl.innerHTML = '✅ 在线';
                statusEl.className = 'status-value status-online';
            } else if (status === 'offline') {
                statusEl.innerHTML = '❌ 离线';
                statusEl.className = 'status-value status-offline';
            } else {
                statusEl.innerHTML = '<span class="spinner"></span>检测中...';
                statusEl.className = 'status-value status-checking';
            }
        }

        async function testConnection() {
            addLog('开始检测 InsForge 服务器...', 'info');
            updateStatus('checking');

            try {
                const response = await fetch(`${SERVER_URL}/health`);
                const data = await response.json();

                if (data.status === 'ok') {
                    addLog('✅ 服务器连接成功！', 'success');
                    addLog(`版本: ${data.version}`, 'success');
                    updateStatus('online', data.version);
                } else {
                    addLog('❌ 服务器响应异常', 'error');
                    updateStatus('offline');
                }
            } catch (error) {
                addLog(`❌ 连接失败: ${error.message}`, 'error');
                addLog('请确保 InsForge 服务器正在运行', 'error');
                addLog('运行命令: npm run insforge', 'info');
                updateStatus('offline');
            }
        }

        async function testRegister() {
            addLog('测试用户注册功能...', 'info');

            const testEmail = `test${Date.now()}@example.com`;
            const testData = {
                email: testEmail,
                password: 'password123',
                username: '测试用户'
            };

            try {
                const response = await fetch(`${SERVER_URL}/api/auth/register`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(testData)
                });

                const data = await response.json();

                if (data.user && data.token) {
                    addLog('✅ 用户注册成功！', 'success');
                    addLog(`邮箱: ${data.user.email}`, 'success');
                    addLog(`用户名: ${data.user.username}`, 'success');
                    addLog(`Token: ${data.token.substring(0, 30)}...`, 'success');
                    addLog('🎉 InsForge API 工作正常！', 'success');
                } else {
                    addLog('❌ 注册失败: 响应格式错误', 'error');
                }
            } catch (error) {
                addLog(`❌ 注册失败: ${error.message}`, 'error');
            }
        }

        // 页面加载时自动测试
        window.onload = () => {
            addLog('页面加载完成，开始自动检测...', 'info');
            testConnection();
        };
    </script>
</body>
</html>
